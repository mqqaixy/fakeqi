name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 签出代码
        uses: actions/checkout@v4

      - name: 2. 暴力安装环境
        run: |
          # 建立 Theos 目录
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 直接从镜像下载 SDK 并解压，跳过所有多余的检查
          mkdir -p $THEOS/sdks
          curl -ksL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o $THEOS/sdks/sdk.tar.xz
          tar -xf $THEOS/sdks/sdk.tar.xz -C $THEOS/sdks/
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 3. 强制编译
        run: |
          # 这一步我们不管文件在哪，全盘搜索并进入
          export THEOS=$HOME/theos
          TARGET_DIR=$(find . -name "Tweak.x" -exec dirname {} \;)
          cd "$TARGET_DIR"
          
          # 手动生成一个绝对不会出错的 Makefile
          cat > Makefile <<EOF
          ARCHS = arm64 arm64e
          TARGET := iphone:clang:latest:14.0
          include \$(THEOS)/makefiles/common.mk
          TWEAK_NAME = FakeLocationPro
          FakeLocationPro_FILES = Tweak.x
          FakeLocationPro_FRAMEWORKS = UIKit CoreLocation
          include \$(THEOS_MAKE_PATH)/tweak.mk
          EOF
          
          # 强制生成 control
          echo -e "Package: com.your.fake\nName: Fake\nVersion: 1.0\nArchitecture: iphoneos-arm" > control
          
          # 执行编译
          make package FINALPACKAGE=1

      - name: 4. 导出
        uses: actions/upload-artifact@v4
        with:
          name: Result
          path: |
            **/packages/*.deb
            **/.theos/obj/debug/*.dylib
