name: Build Dylib

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 安装环境
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz
          tar -xf ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 3. 编译（全路径定位）
        run: |
          export THEOS=$HOME/theos
          # 这一步非常关键：我们在全盘找 Makefile 到底在哪
          export M_PATH=$(find . -name "Makefile" -maxdepth 3)
          export M_DIR=$(dirname "$M_PATH")
          echo "发现项目在目录: $M_DIR"
          
          # 强制进入那个目录并编译
          cd "$M_DIR"
          make FINALPACKAGE=1
          
      - name: 4. 导出成品
        uses: actions/upload-artifact@v4
        with:
          name: FakeLocation-Dylib
          path: |
            **/obj/*.dylib
            **/.theos/obj/*.dylib
