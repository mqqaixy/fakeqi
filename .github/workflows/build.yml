name: Build Tweak
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 安装 Theos 环境
        uses: theos/setup-theos@v1

      - name: 3. 寻找并编译
        run: |
          # 自动寻找 Makefile 并编译
          MAKE_DIR=$(dirname $(find . -name "Makefile" | head -n 1))
          cd "$MAKE_DIR"
          make package FINALPACKAGE=1

      - name: 4. 导出成品
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Packages
          path: |
            **/*.deb
            **/*.dylib
