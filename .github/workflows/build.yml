name: Build Dylib

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 安装编译环境
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz
          tar -xf ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 3. 强制搜寻并打包
        run: |
          export THEOS=$HOME/theos
          # 自动寻找 Makefile 所在的文件夹并进入
          MAKEFILE_PATH=$(find . -name "Makefile" -print -quit)
          DIR_PATH=$(dirname "$MAKEFILE_PATH")
          cd "$DIR_PATH"
          echo "当前工作目录已切换到: $(pwd)"
          ls -F
          make FINALPACKAGE=1

      - name: 4. 导出成品文件
        uses: actions/upload-artifact@v4
        with:
          name: FakeLocation-Dylib
          path: |
            **/obj/**/*.dylib
            **/.theos/obj/**/*.dylib
