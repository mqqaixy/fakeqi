name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 签出代码
        uses: actions/checkout@v4

      - name: 2. 暴力寻找文件
        run: |
          # 寻找你的 Tweak.x 到底在哪，并把路径记下来
          TWEAK_PATH=$(find . -name "Tweak.x" -print -quit)
          if [ -z "$TWEAK_PATH" ]; then echo "仓库里找不到 Tweak.x"; exit 1; fi
          echo "PROJECT_DIR=$(dirname "$TWEAK_PATH")" >> $GITHUB_ENV

      - name: 3. 绕过环境直接编译
        run: |
          cd ${{ env.PROJECT_DIR }}
          # 直接调用系统 clang 编译器，不依赖 Theos，这样绝对不会因为安装环境红叉
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 -arch arm64e \
          -miphoneos-version-min=14.0 \
          -framework UIKit -framework CoreLocation \
          -o FakeLocationPro.dylib Tweak.x \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path)

      - name: 4. 导出成品
        uses: actions/upload-artifact@v4
        with:
          name: FakeLocation-Dylib
          path: "**/*.dylib"
