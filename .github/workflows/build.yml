name: Build Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/theos/sdks
          theos-sdks-branch: master          # 这里控制 SDK 版本！如果 master 不行，改成 iPhoneOS18.0 或你需要的 branch 名
          orion: false

      - name: Cache Theos & SDKs
        uses: actions/cache@v4
        with:
          path: |
            theos
            .theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', 'control', 'Tweak.x*') }}

      - name: Build & Package (rootless)
        run: |
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS_PACKAGE_SCHEME: rootless
          THEOS: ${{ github.workspace }}/theos
          ARCHS: arm64 arm64e

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FakeLocation-build
          path: |
            packages/*.deb
            .theos/obj/*.dylib
          if-no-files-found: warn
