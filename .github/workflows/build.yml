name: Build Dylib

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 安装编译环境
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz
          tar -xf ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 3. 强制搜寻并自愈打包
        run: |
          export THEOS=$HOME/theos
          # 1. 寻找 Makefile 所在的目录
          MAKEFILE_PATH=$(find . -name "Makefile" -print -quit)
          DIR_PATH=$(dirname "$MAKEFILE_PATH")
          cd "$DIR_PATH"
          
          # 2. 强制修复 control 文件 (不管原来有没有，现在造一个准没错的)
          cat > control <<EOF
          Package: com.yourname.fakelocation
          Name: FakeLocationPro
          Depends: mobilesubstrate
          Version: 1.0.0
          Architecture: iphoneos-arm
          Description: FakeLocation Tweak
          Maintainer: Developer
          Author: Developer
          Section: Tweaks
          EOF
          
          # 3. 检查文件是否对齐
          echo "--- 当前工作目录文件列表 ---"
          ls -F
          
          # 4. 开始打包
          make package FINALPACKAGE=1

      - name: 4. 导出成品文件
        uses: actions/upload-artifact@v4
        with:
          name: FakeLocation-Dylib
          path: |
            **/packages/*.deb
            **/.theos/obj/**/*.dylib
