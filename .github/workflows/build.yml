name: Build Dylib

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 一键搭建 Theos 环境
        # 使用官方推荐的 Setup Action，它自带缓存，不容易断连
        uses: theos/setup-theos@v1
        with:
          sdk-version: '14.5'

      - name: 3. 寻找并打包
        run: |
          # 自动寻找 Makefile 所在的文件夹并进入
          MAKEFILE_PATH=$(find . -name "Makefile" -print -quit)
          if [ -z "$MAKEFILE_PATH" ]; then
            echo "错误：没找到 Makefile"
            exit 1
          fi
          cd "$(dirname "$MAKEFILE_PATH")"
          
          # 直接开始打包
          make package FINALPACKAGE=1
          
      - name: 4. 导出
        uses: actions/upload-artifact@v4
        with:
          name: FakeLocation-Dylib
          path: |
            **/packages/*.deb
            **/.theos/obj/debug/*.dylib
